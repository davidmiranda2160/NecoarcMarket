spring.application.name=usuario-service
server.port=8080


spring.datasource.url=jdbc:mysql://localhost:3306/db_neroarcmarket_usuarios?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


logging.level.cl.duoc.usuario=INFO
logging.level.org.hibernate.SQL=DEBUG
#Esta cosa es para que el datetime no salga con chorrocientos numeros
spring.mvc.format.date-time=iso
#Ver si esto causa problemas de conexiones con otros microservicios
services.usuario.baseUrl=http://localhost:8080 