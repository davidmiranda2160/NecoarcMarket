spring:
  application:
    name: inventario-service
  profiles:
    active: dev

# Configuracion de Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Configuracion de Logs
logging:
  level:
    cl:
      duoc:
        inventario: INFO
    org:
      hibernate:
        SQL: DEBUG

---

# Configuracion del perfil Dev 
spring:
  config:
    activate:
      on-profile: dev, prod

  # Configuracion del JPA con hibernate adaptable de forma dinámica
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_necoarcmarket_inventario}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      initialization-fail-timeout: 5000  
      connection-timeout: 5000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Configuracion para que Flyway funcione
  flyway:
    enabled: true
    baseline-on-migrate: true

# Ubicacion de puertos (Puerto 8082 por defecto de Inventario)
server:
  port: ${PORT:8082}

# Servicios Externos
services:
  Productos:
    baseUrl: ${PRODUCTO_SERVICE_URL:http://productos-service:8081}
