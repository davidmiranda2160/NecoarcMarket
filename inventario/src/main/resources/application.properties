spring.application.name=inventario

server.port=8082

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_necoarcmarket_inventario?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# IMPORTANTE: URL para conectar con el microservicio de Productos
services.Productos.baseUrl=http://localhost:8081/v1/productos