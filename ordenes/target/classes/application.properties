spring.application.name=ordenes

# Puerto del microservicio
server.port=8088

# Configuración de Base de Datos
spring.datasource.url=jdbc:mysql://localhost:3306/db_necoarcmarket_ordenes?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

# En Laragon por defecto la contraseña es vacía
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Configuración de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Configuracion para conectarse mediante webClient
services.carrito.baseUrl=http://localhost:8087
services.inventario.baseUrl=http://localhost:8082/v1/inventario

#este era 8090, lo cambie a 8092 porque mi puerto estaba siendo usado en mi pc

#Configuracion para que funcione Swagger

pringdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
