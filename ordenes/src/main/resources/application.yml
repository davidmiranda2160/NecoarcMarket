spring:
  application:
    name: ordenes-service
  
# Configuración de Base de Datos
  datasource:
    url: jdbc:mysql://localhost:3306/db_necoarcmarket_ordenes?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password:     # En Laragon por defecto la contraseña es vacía
    driver-class-name: com.mysql.cj.jdbc.Driver

# Configuración del JPA
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# Configuración de Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true

# Puerto del microservicio
server:
  port: 8088

# URL para que otros lo encuentren
services:
  carrito:
    baseUrl: http://localhost:8087
  inventario:
    baseUrl: http://localhost:8082

# Configuración para que funcione swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

---

spring:
  config:
    activate:
      on-profile: dev, prod

  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:db_necoarcmarket_ordenes}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}

server:
  port: ${PORT:8088}

services:
  carrito:
    baseUrl: ${CARRITO_SERVICE_URL:http://${DB_HOST:localhost}:8087}
  inventario:
    baseUrl: ${INVENTARIO_SERVICE_URL:http://${DB_HOST:localhost}:8082}