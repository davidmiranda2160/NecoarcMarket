spring.application.name=productos
# Puerto del microservicio
server.port=8081


spring.datasource.url=jdbc:mysql://localhost:3306/db_necoarcmarket_productos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root

spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


services.inventario.baseUrl=http://localhost:8082/v1/inventario
