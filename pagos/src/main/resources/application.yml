spring:
  application:
    name: pagos-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev} 
  mvc:
    format:
      date-time: iso

# Puerto del microservicio
server:
  port: ${PORT:8092}

# Configuración para que funcione swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

---
# 🟢 Bloque 1: Laragon (Local)
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://localhost:3306/db_necoarcmarket_pagos?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: 
    driver-class-name: com.mysql.cj.jdbc.Driver

services:
  ordenes:
    baseUrl: http://localhost:8088 

---

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:db_necoarcmarket_pagos}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver

services:
  ordenes:
    baseUrl: ${ORDENES_SERVICE_URL:http://ordenes-service:8088} 

---

spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true