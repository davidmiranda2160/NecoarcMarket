spring.application.name=pagos
server.port=8092
#era puerto 8090


spring.datasource.url=jdbc:mysql://localhost:3306/db_neroarcmarket_pagos?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


logging.level.cl.duoc.usuario=INFO
logging.level.org.hibernate.SQL=DEBUG

# Configuración de URLs de Microservicios externos
services.ordenes.baseUrl=http://localhost:8088/



#Configuracion para que funcione Swagger

pringdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.htmla
