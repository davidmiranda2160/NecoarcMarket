spring.application.name=resenas-service
server.port=8086

spring.datasource.url=jdbc:mysql://localhost:3306/db_necoarcmarket_resenas?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.baseline-on-migrate=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


services.usuario.url=http://localhost:8080/usuario

spring.mvc.format.date-time=iso

# 6. Logs de depuración
logging.level.cl.duoc.resena=DEBUG
