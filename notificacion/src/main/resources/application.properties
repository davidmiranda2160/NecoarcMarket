
spring.application.name=notificacion-service
server.port=8085


spring.datasource.url=jdbc:mysql://localhost:3306/db_notificaciones?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


services.usuario.url=http://localhost:8080/usuario


logging.level.cl.duoc.notificacion=DEBUG