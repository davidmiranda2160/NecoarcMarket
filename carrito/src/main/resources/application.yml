spring:
  application:
    name: carrito-service
  profiles:
    active: dev


springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html


---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/db_necoarcmarket_carrito?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: root
    password: "" # Vacío para Laragon
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8087

service:
  usuario:
    baseUrl: http://localhost:8080
  producto:
    baseUrl: http://localhost:8081


#Configuracion de Logs

logging:
  level:
    cl:
        duoc:
            carrito: INFO
    org:
        hibernate:
            SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_necoarcmarket_carrito}?createDatabaseIfNotExist=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8087}

service:
  usuario:
    baseUrl: ${USUARIO_SERVICE_URL:http://usuario:8080}
  producto:
    baseUrl: ${PRODUCTO_SERVICE_URL:http://productos:8081}